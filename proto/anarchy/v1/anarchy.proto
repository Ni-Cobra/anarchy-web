syntax = "proto3";

package anarchy.v1;

// All client/server traffic is exactly one ClientMessage or ServerMessage
// per WebSocket frame, encoded as binary protobuf. One decode path per
// side; payloads dispatched via the inner oneof.
//
// Payload field-number convention inside the envelope oneofs:
//   10-19 : connection lifecycle (handshake, heartbeat)
//   20-29 : per-tick world state (chunk-centric — see ADR 0003)
//   30-39 : per-client out-of-band state (inventory, etc.)
// New payloads slot into the matching range so wire numbers stay grouped.

// === Envelopes ===

message ClientMessage {
  uint64 seq = 1;
  oneof payload {
    ClientHello hello = 10;
    Ping ping = 11;
    RegisterAccount register_account = 12;
    ClientAction action = 20;
    BreakIntent break_intent = 21;
    PlaceBlock place_block = 22;
    SelectSlot select_slot = 23;
    MoveSlot move_slot = 24;
  }
}

message ServerMessage {
  uint64 seq = 1;
  uint64 ack_seq = 2;
  oneof payload {
    ServerWelcome welcome = 10;
    Pong pong = 11;
    LobbyReject lobby_reject = 12;
    RegisterAccountResult register_account_result = 13;
    TickUpdate tick_update = 20;
    InventoryUpdate inventory_update = 30;
  }
}

// === Handshake ===

// First frame on every connection. Carries the lobby choices the client
// collected before opening the WebSocket: a per-session display `username`
// and an index into the shared color palette (`game::lobby::PALETTE` on the
// server, the same table mirrored client-side). The server validates length,
// charset, and palette range — see `game::lobby::validate_username` /
// `validate_color_index` — and only admits the player to the world once a
// well-formed Hello has landed. The server defers `ServerWelcome` until
// after this frame is processed; admission outcome (fresh allocation vs.
// reconnect to a dormant id, or a `LobbyReject`) shapes the welcome.
// Repeat Hello frames after admission are ignored.
//
// `reconnect` opts the client into reconnect-admission: if a dormant
// saved-player record exists with this exact `username` AND no live
// session currently holds it, the saved `PlayerId` is reused and the
// dormant record's position / velocity / facing / mass / inventory are
// restored. The flag is documented as a temporary identity mechanism
// pending a real auth/login system. When unset, ADR 0005 numeric-suffix
// disambiguation behavior applies unchanged.
message ClientHello {
  string client_version = 1;
  string username = 2;
  uint32 color_index = 3;
  bool reconnect = 4;
  // Password for password-locked usernames (ADR 0007). Empty means
  // "anonymous attempt" — admission proceeds only if the username is not
  // registered. When non-empty: a fresh Hello (`reconnect=false`) verifies
  // against the registered hash if one exists; a reconnect Hello requires
  // the password when the username is registered. The server never echoes
  // this back. The client never persists it (no localStorage).
  string password = 5;
}

message ServerWelcome {
  string server_version = 1;
  uint32 tick_rate_hz = 2;
  // The id the server has assigned to this connection's player.
  uint64 player_id = 3;
  // Chebyshev radius (in chunks) of the per-client view window. The window is
  // a (2r+1)² square of chunks centered on the player's chunk; chunks within
  // the window are eligible for full-state delivery and chunks outside are
  // dropped from the client's known set. ADR 0003 §3.
  int32 view_radius_chunks = 4;
}

// Server reply sent in response to a `ClientHello` whose admission failed.
// Today only the `reconnect`-flagged Hello can produce a reject; a normal
// Hello either succeeds (welcome) or causes the connection to be torn
// down without a reply (invalid username/color charset). The connection
// is closed by the server immediately after this frame is sent.
message LobbyReject {
  enum Reason {
    LOBBY_REJECT_REASON_UNSPECIFIED = 0;
    // The reconnect target username is currently held by a live session.
    LOBBY_REJECT_REASON_RECONNECT_LIVE_SESSION = 1;
    // No dormant record exists with the requested username.
    LOBBY_REJECT_REASON_RECONNECT_NO_RECORD = 2;
    // Reconnect path: the username is registered but the supplied password
    // was empty.
    LOBBY_REJECT_REASON_PASSWORD_REQUIRED = 3;
    // Either path: the username is registered and the supplied password
    // does not match the stored hash.
    LOBBY_REJECT_REASON_PASSWORD_INCORRECT = 4;
    // Fresh Hello (`reconnect=false`) on a registered username with empty
    // password. Distinct from `PASSWORD_REQUIRED` (reconnect path) so the
    // lobby UX can render "this name is taken — sign in to claim it".
    LOBBY_REJECT_REASON_USERNAME_TAKEN_BY_REGISTRATION = 5;
  }
  Reason reason = 1;
}

// === Account registration (ADR 0007) ===
//
// Client→server in-game registration. The lobby identity is taken from the
// already-admitted player's session (the server knows which connection sent
// this); the client only ships the password. The server hashes (argon2id),
// writes `<world>.accounts.json`, and replies with `RegisterAccountResult`.
// The session that just registered keeps playing on its current admit; the
// lock applies starting next session.
message RegisterAccount {
  string password = 1;
}

message RegisterAccountResult {
  enum Status {
    REGISTER_ACCOUNT_STATUS_UNSPECIFIED = 0;
    // Hashed + persisted; future sessions under this username require the
    // password.
    REGISTER_ACCOUNT_STATUS_OK = 1;
    // The canonical (lowercased) username already has an account record.
    // Re-registration is intentionally not supported in this iteration.
    REGISTER_ACCOUNT_STATUS_ALREADY_REGISTERED = 2;
    // I/O failure during write or hashing failure. The in-memory registry
    // is unchanged; the client may retry.
    REGISTER_ACCOUNT_STATUS_ERROR = 3;
  }
  Status status = 1;
}

// === Heartbeat ===

message Ping {
  uint64 client_time_ms = 1;
}

message Pong {
  uint64 client_time_ms = 1;
  uint64 server_time_ms = 2;
}

// === Client -> server intent ===

// Server-authoritative client intent for one tick. The server alone derives
// the resulting position; the client never sends coordinates.
//
// Today the only intent is movement; future kinds (attack, pickup, …) will
// land here as siblings. The client emits these as state-replacing updates
// — the server stores the latest per-player intent and advances positions
// each tick from it. Diagonals are normalized client-side; the server
// clamps `|move_intent| ≤ 1` defensively.
//
// `client_seq` is a per-client monotonic action counter. The server stores
// the largest seq it has applied for each player and echoes it back in the
// player's `PlayerSnapshot.acked_client_seq` field, so the client knows
// which of its inputs the server has integrated.
message ClientAction {
  MoveIntent move_intent = 1;
  uint64 client_seq = 2;
}

// Continuous 2D movement intent in world axes (+x = east, +y = north).
// Magnitude is in `{0, 1}` for a canonical client (zero = stopped, one =
// full speed in the (dx, dy) direction). The server clamps to ≤ 1.
message MoveIntent {
  double dx = 1;
  double dy = 2;
}

// Client→server *continuous* intent to break a top-layer block — the
// held-action durability model from ADR 0006. Same lifetime semantics as
// `MoveIntent`: the server keeps the latest intent per player; absence of
// the inner `target` (proto3 message-type optional) means "no longer
// targeting anything". A player who holds the break key sends this on
// initial press, again whenever the targeted tile changes, and once with
// `target` cleared on release; a defensive keep-alive resend every 10
// ticks (0.5 s) of the current intent guards against a dropped frame
// stranding a held break.
//
// The damage / recovery mechanics live server-side: each tick the world
// applies 1 dur/tick of damage per targeting player to the block named by
// `target` (additive across players), kicks recovery on after a delay
// once nobody is targeting it, and emits the eventual break as a normal
// chunk mutation in the next per-client `TickUpdate`. See ADR 0006 for
// the full numbers and storage shape.
//
// Validation failures (player unknown, target out of `REACH_BLOCKS`,
// out-of-range local coords, target on Air or a non-targetable kind)
// are silently dropped: a misbehaving client cannot tell whether it lost
// a race or sent a malformed message.
message BreakIntent {
  // Absent = "stop targeting" (release / no held break).
  BreakTarget target = 1;
  // Per-client monotonic action seq; the server ratchets the player's
  // `last_acked_client_seq` forward to its largest seen value.
  uint64 client_seq = 2;
}

// One target tile inside a `BreakIntent`. Local coords must be in
// `[0, LAYER_SIZE)` — out-of-range values are validated server-side and
// silently dropped.
message BreakTarget {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
}

// Client→server intent to place a top-layer block at the given cell. The
// server picks the placed block kind authoritatively from the player's
// currently-selected hotbar slot (`Player::selected_hotbar_slot`): if the
// slot is empty or holds an item without a `places_block`, the action is
// dropped; otherwise the slot is decremented by 1 and the block placed.
// The server validates: chunk loaded, target cell's top is currently Air,
// no player AABB overlaps the cell, and the player's authoritative
// position is within `crate::config::REACH_BLOCKS` of the cell center.
// Failures are silently dropped — same posture as `BreakIntent`.
//
// Field 4 was previously `BlockType kind` (client-driven builder-mode
// affordance) and was removed when placement became inventory-driven.
message PlaceBlock {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
  reserved 4;
  reserved "kind";
}

// Client→server "select hotbar slot" action. The server stores the chosen
// slot per player so subsequent `PlaceBlock` actions can be validated
// against authoritative selection (a misbehaving client cannot lie about
// "which slot is selected" on every place). Validation: `slot <
// HOTBAR_SLOTS as u32` (server-side constant). Failures are silently
// dropped. No echo back — the next `InventoryUpdate` reflects any
// resulting state, and selection itself doesn't need confirmation.
message SelectSlot {
  uint32 slot = 1;
  // Per-client monotonic action seq; the server ratchets the player's
  // `last_acked_client_seq` forward to its largest seen value.
  uint64 client_seq = 2;
}

// Client→server "move items between slots" action — covers hotbar ↔
// hotbar, hotbar ↔ main, main ↔ main drags from the inventory UI. The
// server validates indices (`< INVENTORY_SIZE`), then applies
// `Inventory::merge_stacks(src, dst)`; if that returns `false` (different
// item kinds or both empty), falls back to `Inventory::swap_slots(src,
// dst)`. Failures are silently dropped; the next `InventoryUpdate`
// reflects the result.
message MoveSlot {
  uint32 src = 1;
  uint32 dst = 2;
  uint64 client_seq = 3;
}

// === Server -> client world state ===
//
// The server emits one `TickUpdate` per tick per client (see ADR 0003 — the
// chunk-centric networking model). Each client has a "view window" — the
// (2r+1)² square of chunks within `view_radius_chunks` of their own chunk —
// and the tick-update tells the client:
//
//   1. `full_state_chunks` — chunks that need to be (re)installed wholesale,
//      including their player set. These are chunks the client didn't
//      previously have in its known set, OR chunks it had that changed this
//      tick (any player moved within / into / out of the chunk).
//   2. `unmodified_chunks` — chunks the client still has and that didn't
//      change. The list is explicit so the client can distinguish "still in
//      view, no update needed" from "fell out of view" (implicit unload).
//
// Implicit-unload rule: anything in the client's last-known view window
// that does not appear in either field of this `TickUpdate` is dropped. A
// player that simply walks out of the receiver's view window disappears the
// same way — the chunk that contained them is no longer in the client's
// view, so the implicit-unload rule retires the player along with it.
//
// The first `TickUpdate` after `ServerWelcome` carries every chunk in the
// new player's view window as full-state (the client's known set is empty
// on connect and on reconnect).

message TickUpdate {
  repeated Chunk full_state_chunks = 1;
  repeated ChunkCoord unmodified_chunks = 2;
  // Per-tick block-edit feed (ADR-tracked side-channel for task 070).
  // Distinct from `full_state_chunks` because chunk delivery only tells the
  // client *what* the world looks like now, not *who* did the edit nor *when*
  // — both of which the targeting / pulse / shatter effects need to attribute
  // and animate. Scoped to the recipient's view window: an edit whose
  // `chunk_coord` is outside the receiver's window is suppressed (the
  // recipient wouldn't see the block anyway). Empty when no edits this tick.
  repeated BlockEdit edits = 3;
  // Players currently held-break-targeting a tile inside the recipient's view
  // window. Re-emitted every tick the set is non-empty so the client renders
  // a faint outlined frame + thin durability bar at the targeted cell, and
  // the absence of an entry is the canonical "stop showing the overlay"
  // signal (no separate release event). Includes the local player's own
  // targets so visuals stay consistent. Scope mirrors `edits` — entries whose
  // `chunk_coord` is outside the recipient's window are suppressed.
  repeated TargetingState targets = 4;
}

// One block edit emitted by the server this tick. `Placed` covers
// `try_place_top_block` outcomes (right-click, hotbar-driven kind); `Broken`
// covers `try_break_top_block` outcomes including the held-break completion
// path through `tick_durability`. The kind is the *resulting* top block for
// `Placed` (so the client can tint the pulse to match) and the *removed*
// top block for `Broken` (so a tree shatter can look different from a stone
// shatter if a future client wants).
message BlockEdit {
  enum Kind {
    BLOCK_EDIT_KIND_UNSPECIFIED = 0;
    BLOCK_EDIT_KIND_PLACED = 1;
    BLOCK_EDIT_KIND_BROKEN = 2;
  }
  uint64 player_id = 1;
  Kind kind = 2;
  ChunkCoord chunk_coord = 3;
  uint32 local_x = 4;
  uint32 local_y = 5;
  // The top-layer block kind involved in this edit — placed kind for
  // `Placed`, removed kind for `Broken`. Carries enough context that the
  // renderer can colorize / pick a particle template without re-reading the
  // chunk.
  BlockType block_type = 6;
}

// One held-break targeting state currently active in the recipient's view
// window. Emitted every tick a player is targeting a still-targetable cell
// (the durability sweep validates reach + targetable kind before a damage
// tick lands; the same predicate gates inclusion here). `durability_pct` is
// `current * 100 / max_durability` rounded down — `100` means "fresh" and
// `0` means "next tick lands the break". Encoded `u8`-wide via the proto3
// `uint32` minimum so the field stays compact when many players target many
// blocks.
message TargetingState {
  uint64 player_id = 1;
  ChunkCoord chunk_coord = 2;
  uint32 local_x = 3;
  uint32 local_y = 4;
  uint32 durability_pct = 5;
}

message ChunkCoord {
  int32 cx = 1;
  int32 cy = 2;
}

message PlayerSnapshot {
  uint64 id = 1;
  // Continuous world coordinates (+x = east, +y = north).
  double x = 2;
  double y = 3;
  // Largest `ClientAction.client_seq` from this player that the server has
  // integrated. Always present; zero before the player has sent any action.
  uint64 acked_client_seq = 4;
  // Direction the player is currently facing — sticky: the server snaps it
  // to the nearest of 8 each tick the stored movement intent is non-zero,
  // and leaves it alone when intent is zero so a stopped player keeps
  // looking where they were going.
  Direction8 facing = 5;
  // Lobby-chosen display name (already trimmed + validated server-side per
  // `game::lobby::validate_username`). Per-session only — not persisted, not
  // unique across players.
  string username = 6;
  // Index into the shared lobby palette (`game::lobby::PALETTE`). Validated
  // server-side; the renderer tints the player body by this entry.
  uint32 color_index = 7;
}

// 8-way facing for the sphere-with-eyes player model. Cardinal first, then
// diagonals, in clockwise order starting from north. `UNSPECIFIED` is the
// proto3 default sentinel and is never emitted by the server (a freshly
// spawned player defaults to `S`); clients treat it as `S` defensively.
enum Direction8 {
  DIRECTION8_UNSPECIFIED = 0;
  DIRECTION8_N = 1;
  DIRECTION8_NE = 2;
  DIRECTION8_E = 3;
  DIRECTION8_SE = 4;
  DIRECTION8_S = 5;
  DIRECTION8_SW = 6;
  DIRECTION8_W = 7;
  DIRECTION8_NW = 8;
}

// === Terrain ===
//
// Mirrors the in-memory model fixed by ADR 0002 (anarchy-server/docs/
// decisions/0002-terrain-model.md): a chunk is two named layers
// (`ground` walkable surface, `top` standing geometry); each layer is a
// flat 16×16 array of `Block`s; a `Block` is a struct wrapping a typed
// kind so per-block metadata can grow as a field addition rather than a
// per-variant change. Wire integers for `BlockType` are chosen so AIR
// occupies the proto3 zero value — a default-initialized `Block` is an
// empty tile, which is exactly the right semantic. This deviates from
// the `Direction8` convention (`*_UNSPECIFIED = 0`) deliberately:
// `Direction8` has no natural identity element, but `BlockType` does,
// so a separate sentinel would just collapse into AIR anyway.
//
// Per ADR 0003 the chunk also carries the set of players whose centers
// currently fall inside it — chunk delivery is the unit of player
// delivery, not just terrain.

enum BlockType {
  BLOCK_TYPE_AIR = 0;
  BLOCK_TYPE_GRASS = 1;
  BLOCK_TYPE_WOOD = 2;
  BLOCK_TYPE_STONE = 3;
  BLOCK_TYPE_GOLD = 4;
  BLOCK_TYPE_TREE = 5;
  // Tree-felling drop. Top-layer-only, walk-through (no collision); placed
  // by `World::try_break_top_block` when a Tree is broken (see its docs for
  // the 3×3 random-drop rule). Not generated by worldgen, not placeable
  // through `PlaceBlock` today.
  BLOCK_TYPE_STICKS = 6;
}

// One tile. Field set is intentionally minimal today — the wrapper
// message exists so per-block metadata (variant, hp, owner, lighting,
// …) can be added as field additions without rippling through every
// signature.
message Block {
  BlockType kind = 1;
}

// One horizontal slab of blocks. `blocks` is a flat array of length
// `LAYER_AREA = LAYER_SIZE * LAYER_SIZE = 16 * 16 = 256`, indexed by
// `idx(x, y) = y * LAYER_SIZE + x`. Receivers MUST verify the length
// before indexing — the wire encoding can't enforce it (proto3 has no
// fixed-size repeated).
message Layer {
  repeated Block blocks = 1;
}

// One 16×16 chunk at chunk-coord `(cx, cy)`. Chunk-coord `(cx, cy)` covers
// world tiles `cx*16 .. (cx+1)*16` along both axes — see ADR 0002 §5.
//
// Per ADR 0003 chunks carry the players whose center currently falls
// within them: the chunk is the unit of player delivery as well as
// terrain delivery. `players` is sorted by `PlayerSnapshot.id` so the
// wire form is deterministic for tests.
message Chunk {
  ChunkCoord coord = 1;
  Layer ground = 2;
  Layer top = 3;
  repeated PlayerSnapshot players = 4;
}

// === Inventory ===
//
// Per-player inventory mirror. Shipped to the originating client only — other
// connections never see another player's inventory. Sent immediately after
// `ServerWelcome` for the admitted client, then again each tick where the
// player's inventory mutated (drops, slot moves, place-consume — landing in
// later tasks).
//
// Carries the full slot array every time. Slot count is fixed to the
// server's `INVENTORY_SIZE` (9 hotbar + 36 main = 45); the client validates
// and rejects unexpected lengths defensively.

// Mirrors `crate::game::ItemId`. Numeric values are arbitrary but stable —
// extend by appending. `ITEM_ID_UNSPECIFIED = 0` is the proto3 default
// sentinel; the server never emits it.
enum ItemId {
  ITEM_ID_UNSPECIFIED = 0;
  ITEM_ID_STICK = 1;
  ITEM_ID_WOOD = 2;
  ITEM_ID_STONE = 3;
  ITEM_ID_GOLD = 4;
}

// One inventory cell. `count == 0` is the canonical empty slot — the server
// emits `count == 0` (and `item == ITEM_ID_UNSPECIFIED`) for empty slots so
// the wire shape mirrors the in-memory `Slot = Option<ItemStack>` exactly.
// Receivers MUST treat `count == 0` as empty regardless of `item`.
message ItemSlot {
  ItemId item = 1;
  uint32 count = 2;
}

message InventoryUpdate {
  // Full slot array — length is the server's `INVENTORY_SIZE` (45). Indices
  // `0..9` are the hotbar; `9..45` are the main grid. Receivers reject any
  // other length defensively.
  repeated ItemSlot slots = 1;
}
