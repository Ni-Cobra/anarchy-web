syntax = "proto3";

package anarchy.v1;

// All client/server traffic is exactly one ClientMessage or ServerMessage
// per WebSocket frame, encoded as binary protobuf. One decode path per
// side; payloads dispatched via the inner oneof.
//
// Payload field-number convention inside the envelope oneofs:
//   10-19 : connection lifecycle (handshake, heartbeat)
//   20-29 : per-tick state and intent
// New payloads slot into the matching range so wire numbers stay grouped.

// === Envelopes ===

message ClientMessage {
  uint64 seq = 1;
  oneof payload {
    ClientHello hello = 10;
    Ping ping = 11;
    ClientAction action = 20;
  }
}

message ServerMessage {
  uint64 seq = 1;
  uint64 ack_seq = 2;
  oneof payload {
    ServerWelcome welcome = 10;
    Pong pong = 11;
    StateUpdate state_update = 20;
    PlayerDespawned player_despawned = 21;
  }
}

// === Handshake ===

message ClientHello {
  string client_version = 1;
}

message ServerWelcome {
  string server_version = 1;
  uint32 tick_rate_hz = 2;
  // The id the server has assigned to this connection's player.
  uint64 player_id = 3;
  // Initial world state so a late joiner is correct from frame zero.
  WorldSnapshot snapshot = 4;
}

// === Heartbeat ===

message Ping {
  uint64 client_time_ms = 1;
}

message Pong {
  uint64 client_time_ms = 1;
  uint64 server_time_ms = 2;
}

// === Client -> server intent ===

// Server-authoritative movement intent. The server alone derives the
// resulting position; the client never sends coordinates.
//
// One frame may carry multiple action kinds - typically one per held
// direction key on the client - so a player holding W+D for a diagonal
// produces a single frame per tick instead of two competing frames.
// Actions are applied in array order within the next tick. Frame size
// and emission rate are bounded server-side.
message ClientAction {
  repeated ActionKind actions = 1;
}

enum ActionKind {
  ACTION_KIND_UNSPECIFIED = 0;
  ACTION_KIND_MOVE_NORTH = 1;
  ACTION_KIND_MOVE_SOUTH = 2;
  ACTION_KIND_MOVE_EAST = 3;
  ACTION_KIND_MOVE_WEST = 4;
}

// === Server -> client world state ===

// Periodic full-world broadcast emitted by the server tick loop.
message StateUpdate {
  WorldSnapshot snapshot = 1;
}

message WorldSnapshot {
  repeated PlayerSnapshot players = 1;
}

message PlayerSnapshot {
  uint64 id = 1;
  // Continuous world coordinates (+x = east, +y = north). Tile coordinates
  // are no longer the wire format — positions advance by sub-tile amounts as
  // movement intent and tick-based stepping land. See ADR 0001.
  double x = 2;
  double y = 3;
}

// Emitted when a player leaves the world.
message PlayerDespawned {
  uint64 player_id = 1;
}
