syntax = "proto3";

package anarchy.v1;

// All client/server traffic is exactly one ClientMessage or ServerMessage
// per WebSocket frame, encoded as binary protobuf. One decode path per
// side; payloads dispatched via the inner oneof.
//
// Payload field-number convention inside the envelope oneofs:
//   10-19 : connection lifecycle (handshake, heartbeat)
//   20-29 : per-tick world state (chunk-centric — see ADR 0003)
//   30-39 : per-client out-of-band state (inventory, etc.)
// New payloads slot into the matching range so wire numbers stay grouped.

// === Envelopes ===

message ClientMessage {
  uint64 seq = 1;
  oneof payload {
    ClientHello hello = 10;
    Ping ping = 11;
    RegisterAccount register_account = 12;
    ClientAction action = 20;
    BreakIntent break_intent = 21;
    PlaceBlock place_block = 22;
    SelectSlot select_slot = 23;
    MoveSlot move_slot = 24;
    EquipTool equip_tool = 25;
    UnequipTool unequip_tool = 26;
    CraftRequest craft = 27;
    TransferItems transfer_items = 28;
    OpenChest open_chest = 29;
    CloseChest close_chest = 30;
  }
}

message ServerMessage {
  uint64 seq = 1;
  uint64 ack_seq = 2;
  oneof payload {
    ServerWelcome welcome = 10;
    Pong pong = 11;
    LobbyReject lobby_reject = 12;
    RegisterAccountResult register_account_result = 13;
    TickUpdate tick_update = 20;
    InventoryUpdate inventory_update = 30;
    ChestUpdate chest_update = 31;
  }
}

// === Handshake ===

// First frame on every connection. Carries the lobby choices the client
// collected before opening the WebSocket: a per-session display `username`
// and an index into the shared color palette (`game::lobby::PALETTE` on the
// server, the same table mirrored client-side). The server validates length,
// charset, and palette range — see `game::lobby::validate_username` /
// `validate_color_index` — and only admits the player to the world once a
// well-formed Hello has landed. The server defers `ServerWelcome` until
// after this frame is processed; admission outcome (fresh allocation vs.
// reconnect to a dormant id, or a `LobbyReject`) shapes the welcome.
// Repeat Hello frames after admission are ignored.
//
// `reconnect` opts the client into reconnect-admission: if a dormant
// saved-player record exists with this exact `username` AND no live
// session currently holds it, the saved `PlayerId` is reused and the
// dormant record's position / velocity / facing / mass / inventory are
// restored. The flag is documented as a temporary identity mechanism
// pending a real auth/login system. When unset, ADR 0005 numeric-suffix
// disambiguation behavior applies unchanged.
message ClientHello {
  string client_version = 1;
  string username = 2;
  uint32 color_index = 3;
  bool reconnect = 4;
  // Password for password-locked usernames (ADR 0007). Empty means
  // "anonymous attempt" — admission proceeds only if the username is not
  // registered. When non-empty: a fresh Hello (`reconnect=false`) verifies
  // against the registered hash if one exists; a reconnect Hello requires
  // the password when the username is registered. The server never echoes
  // this back. The client never persists it (no localStorage).
  string password = 5;
}

message ServerWelcome {
  string server_version = 1;
  uint32 tick_rate_hz = 2;
  // The id the server has assigned to this connection's player.
  uint64 player_id = 3;
  // Chebyshev radius (in chunks) of the per-client view window. The window is
  // a (2r+1)² square of chunks centered on the player's chunk; chunks within
  // the window are eligible for full-state delivery and chunks outside are
  // dropped from the client's known set. ADR 0003 §3.
  int32 view_radius_chunks = 4;
}

// Server reply sent in response to a `ClientHello` whose admission failed.
// Today only the `reconnect`-flagged Hello can produce a reject; a normal
// Hello either succeeds (welcome) or causes the connection to be torn
// down without a reply (invalid username/color charset). The connection
// is closed by the server immediately after this frame is sent.
message LobbyReject {
  enum Reason {
    LOBBY_REJECT_REASON_UNSPECIFIED = 0;
    // The reconnect target username is currently held by a live session.
    LOBBY_REJECT_REASON_RECONNECT_LIVE_SESSION = 1;
    // No dormant record exists with the requested username.
    LOBBY_REJECT_REASON_RECONNECT_NO_RECORD = 2;
    // Reconnect path: the username is registered but the supplied password
    // was empty.
    LOBBY_REJECT_REASON_PASSWORD_REQUIRED = 3;
    // Either path: the username is registered and the supplied password
    // does not match the stored hash.
    LOBBY_REJECT_REASON_PASSWORD_INCORRECT = 4;
    // Fresh Hello (`reconnect=false`) on a registered username with empty
    // password. Distinct from `PASSWORD_REQUIRED` (reconnect path) so the
    // lobby UX can render "this name is taken — sign in to claim it".
    LOBBY_REJECT_REASON_USERNAME_TAKEN_BY_REGISTRATION = 5;
  }
  Reason reason = 1;
}

// === Account registration (ADR 0007) ===
//
// Client→server in-game registration. The lobby identity is taken from the
// already-admitted player's session (the server knows which connection sent
// this); the client only ships the password. The server hashes (argon2id),
// writes `<world>.accounts.json`, and replies with `RegisterAccountResult`.
// The session that just registered keeps playing on its current admit; the
// lock applies starting next session.
message RegisterAccount {
  string password = 1;
}

message RegisterAccountResult {
  enum Status {
    REGISTER_ACCOUNT_STATUS_UNSPECIFIED = 0;
    // Hashed + persisted; future sessions under this username require the
    // password.
    REGISTER_ACCOUNT_STATUS_OK = 1;
    // The canonical (lowercased) username already has an account record.
    // Re-registration is intentionally not supported in this iteration.
    REGISTER_ACCOUNT_STATUS_ALREADY_REGISTERED = 2;
    // I/O failure during write or hashing failure. The in-memory registry
    // is unchanged; the client may retry.
    REGISTER_ACCOUNT_STATUS_ERROR = 3;
  }
  Status status = 1;
}

// === Heartbeat ===

message Ping {
  uint64 client_time_ms = 1;
}

message Pong {
  uint64 client_time_ms = 1;
  uint64 server_time_ms = 2;
}

// === Client -> server intent ===

// Server-authoritative client intent for one tick. The server alone derives
// the resulting position; the client never sends coordinates.
//
// Today the only intent is movement; future kinds (attack, pickup, …) will
// land here as siblings. The client emits these as state-replacing updates
// — the server stores the latest per-player intent and advances positions
// each tick from it. Diagonals are normalized client-side; the server
// clamps `|move_intent| ≤ 1` defensively.
//
// `client_seq` is a per-client monotonic action counter. The server stores
// the largest seq it has applied for each player and echoes it back in the
// player's `PlayerSnapshot.acked_client_seq` field, so the client knows
// which of its inputs the server has integrated.
message ClientAction {
  MoveIntent move_intent = 1;
  uint64 client_seq = 2;
}

// Continuous 2D movement intent in world axes (+x = east, +y = north).
// Magnitude is in `{0, 1}` for a canonical client (zero = stopped, one =
// full speed in the (dx, dy) direction). The server clamps to ≤ 1.
message MoveIntent {
  double dx = 1;
  double dy = 2;
}

// Client→server *continuous* intent to break a top-layer block — the
// held-action durability model from ADR 0006. Same lifetime semantics as
// `MoveIntent`: the server keeps the latest intent per player; absence of
// the inner `target` (proto3 message-type optional) means "no longer
// targeting anything". A player who holds the break key sends this on
// initial press, again whenever the targeted tile changes, and once with
// `target` cleared on release; a defensive keep-alive resend every 10
// ticks (0.5 s) of the current intent guards against a dropped frame
// stranding a held break.
//
// The damage / recovery mechanics live server-side: each tick the world
// applies 1 dur/tick of damage per targeting player to the block named by
// `target` (additive across players), kicks recovery on after a delay
// once nobody is targeting it, and emits the eventual break as a normal
// chunk mutation in the next per-client `TickUpdate`. See ADR 0006 for
// the full numbers and storage shape.
//
// Validation failures (player unknown, target out of `REACH_BLOCKS`,
// out-of-range local coords, target on Air or a non-targetable kind)
// are silently dropped: a misbehaving client cannot tell whether it lost
// a race or sent a malformed message.
message BreakIntent {
  // Absent = "stop targeting" (release / no held break).
  BreakTarget target = 1;
  // Per-client monotonic action seq; the server ratchets the player's
  // `last_acked_client_seq` forward to its largest seen value.
  uint64 client_seq = 2;
}

// One target tile inside a `BreakIntent`. Local coords must be in
// `[0, LAYER_SIZE)` — out-of-range values are validated server-side and
// silently dropped.
message BreakTarget {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
}

// Client→server intent to place a top-layer block at the given cell. The
// server picks the placed block kind authoritatively from the player's
// currently-selected hotbar slot (`Player::selected_hotbar_slot`): if the
// slot is empty or holds an item without a `places_block`, the action is
// dropped; otherwise the slot is decremented by 1 and the block placed.
// The server validates: chunk loaded, target cell's top is currently Air,
// no player AABB overlaps the cell, and the player's authoritative
// position is within `crate::config::REACH_BLOCKS` of the cell center.
// Failures are silently dropped — same posture as `BreakIntent`.
//
// Field 4 was previously `BlockType kind` (client-driven builder-mode
// affordance) and was removed when placement became inventory-driven.
message PlaceBlock {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
  reserved 4;
  reserved "kind";
}

// Client→server "select hotbar slot" action. The server stores the chosen
// slot per player so subsequent `PlaceBlock` actions can be validated
// against authoritative selection (a misbehaving client cannot lie about
// "which slot is selected" on every place). Validation: `slot <
// HOTBAR_SLOTS as u32` (server-side constant). Failures are silently
// dropped. No echo back — the next `InventoryUpdate` reflects any
// resulting state, and selection itself doesn't need confirmation.
message SelectSlot {
  uint32 slot = 1;
  // Per-client monotonic action seq; the server ratchets the player's
  // `last_acked_client_seq` forward to its largest seen value.
  uint64 client_seq = 2;
}

// Client→server "move items between slots" action — covers hotbar ↔
// hotbar, hotbar ↔ main, main ↔ main drags from the inventory UI. The
// server validates indices (`< INVENTORY_SIZE`), then applies
// `Inventory::merge_stacks(src, dst)`; if that returns `false` (different
// item kinds or both empty), falls back to `Inventory::swap_slots(src,
// dst)`. Failures are silently dropped; the next `InventoryUpdate`
// reflects the result.
//
// Task 590 multi-chest: the `src_chest` / `dst_chest` fields became
// `ChestLocation` instead of `bool`. Absence means "player grid";
// presence names which open chest the slot index refers to. The server
// silently drops any frame whose named chest isn't in the player's
// open-chests set.
message MoveSlot {
  uint32 src = 1;
  uint32 dst = 2;
  uint64 client_seq = 3;
  // Field numbers 4, 5 originally carried `bool src_chest` / `bool
  // dst_chest` (task 420 single-open). Task 590 reshaped them into
  // `ChestLocation`s with bumped numbers — old numbers reserved so no
  // future schema edit reuses them with a different shape.
  reserved 4, 5;
  // Task 590: when present, the slot index lives in this chest's grid;
  // when absent, it lives in the player's own grid.
  optional ChestLocation src_chest = 6;
  optional ChestLocation dst_chest = 7;
}

// Identifies which equipment slot a wire `EquipTool` / `UnequipTool` action
// targets. The wire kind must agree with the kind of the item at
// `EquipTool.source_slot` — a Wood Pickaxe equipped to the Axe slot is
// rejected server-side. `TOOL_KIND_UNSPECIFIED = 0` is the proto3 default
// sentinel and is treated as a malformed action.
enum ToolKind {
  TOOL_KIND_UNSPECIFIED = 0;
  TOOL_KIND_PICKAXE = 1;
  TOOL_KIND_AXE = 2;
  // Task 360 third equipment slot, sitting next to pickaxe + axe in the
  // mini-hotbar. Empty by default — utility items (lantern, …) land in
  // task 370+. Server validates `EquipTool.tool_kind == UTILITY` against
  // the source slot's `ItemId::tool_kind` exactly the same way as the
  // existing kinds.
  TOOL_KIND_UTILITY = 3;
  // Task 530 fourth equipment slot, sitting next to pickaxe / axe /
  // utility in the mini-hotbar. Shovels fast-mine `Sand`, `Dirt`,
  // `Gravel`, `Grass` with the matching tier; wrong tool falls back to
  // the soft tool gate (task 520) — slow and dropless.
  TOOL_KIND_SHOVEL = 4;
}

// Client→server "equip the tool currently at `source_slot` into the
// equipment slot named by `tool_kind`". The server validates indices, that
// the source slot holds a tool of the matching kind, then atomically swaps
// the source slot with the equipment slot — any tool currently equipped
// returns to `source_slot`. Failures are silently dropped; the next
// `InventoryUpdate` reflects the result.
message EquipTool {
  uint32 source_slot = 1;
  ToolKind tool_kind = 2;
  uint64 client_seq = 3;
}

// Client→server "unequip the tool currently in the equipment slot named by
// `tool_kind`". Equipment is a flag pointing at an inventory cell (task 010
// rework) — the tool itself already lives in its inventory slot, so the
// server just clears the flag. If the slot is already empty, the action is
// silently dropped. The next `InventoryUpdate` ships the cleared flag.
message UnequipTool {
  ToolKind tool_kind = 1;
  uint64 client_seq = 2;
}

// Client→server "craft the recipe named by `recipe_id`" (task 090). The
// server owns the recipe set; the client picks a stable string id from the
// per-player `craftable_recipe_ids` field shipped on every `InventoryUpdate`.
// The server re-validates ingredient availability against the player's
// pooled inventory + hotbar, deducts ingredients (main slots first so
// equipped hotbar tools stay put), and inserts the output via the same
// `try_add` path as a block-break drop. Failures are silently dropped —
// recipe unknown, ingredients no longer satisfied (ate the last log),
// inventory full to receive the output. The next `InventoryUpdate` reflects
// any successful mutation.
message CraftRequest {
  string recipe_id = 1;
  uint64 client_seq = 2;
}

// Client→server "transfer up to `count` items from `src` into `dst`" — the
// right-click split flow (BACKLOG 410). The server validates indices, that
// `src` is non-empty, and that `dst` is empty or holds the same item kind,
// then moves `min(count, src.count, dst_max - dst.count)` items. Mismatched
// destination kind is a no-op (no swap fallback — that path is `MoveSlot`'s
// job). The drag-and-drop UX uses `MoveSlot` for full-stack moves with
// merge-or-swap semantics; `TransferItems` exists for partial transfers
// where the right-click hold flow ships repeated `count = 1` frames as it
// ramps up. Failures are silently dropped — same posture as `MoveSlot`.
message TransferItems {
  uint32 src = 1;
  uint32 dst = 2;
  uint32 count = 3;
  uint64 client_seq = 4;
  // Field numbers 5, 6 originally carried `bool src_chest` / `bool
  // dst_chest` (task 420 single-open). Task 590 reshaped them into
  // `ChestLocation`s with bumped numbers.
  reserved 5, 6;
  // Task 590: when present, the slot index lives in this chest's grid;
  // when absent, it lives in the player's own grid. See `MoveSlot`.
  optional ChestLocation src_chest = 7;
  optional ChestLocation dst_chest = 8;
}

// Client→server "open the chest at `(chunk_coord, local_x, local_y)`" — task
// 420. Server validates that the cell holds a chest block and that the player
// is within `crate::config::REACH_BLOCKS` of the tile center, then records
// the chest as the player's currently-open chest. The very next
// `ChestUpdate` ships the chest's full slot array; subsequent ticks
// re-emit it when content mutates. Failures are silently dropped.
message OpenChest {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
  uint64 client_seq = 4;
}

// Client→server "close the chest at `chest`" — task 420 / 590. Removes
// the named chest from the player's open-chests set (task 590 generalized
// the single-open to a bounded multi-open set). The server emits one
// final `ChestUpdate` with `closed = true` for that chest, then drops it
// from the per-conn shipped map. No-op if the named chest wasn't open.
message CloseChest {
  uint64 client_seq = 1;
  // Task 590: names which chest the player is closing. Required by
  // shape; an absent message is treated as a malformed close and dropped.
  ChestLocation chest = 2;
}

// === Server -> client per-tick chest state (task 420) ===

// One open-chest location: the chunk and local cell hosting the chest.
message ChestLocation {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
}

// Per-chest open/close state shipped to one player. Task 590 generalized
// the single-open shape into a per-chest shape: each `ChestUpdate`
// covers exactly one chest, and the server may emit several in one tick
// if multiple of the player's open chests changed.
//
// Lifecycle:
// - On `OpenChest` admission the server ships one update with the chest's
//   full slot array (`closed = false`).
// - Each tick a still-open chest mutates the server ships a fresh full
//   slot array for that chest (`closed = false`).
// - When the chest closes (range loss, broken, explicit `CloseChest`, or
//   evicted from the open set), the server ships one final update with
//   `closed = true` and `slots` empty; the client retires the chest's
//   grid mirror.
//
// `slots` carries the full slot array of the chest's `Inventory` (45 slots
// today, mirroring the player inventory size) for an open update, empty
// for a close update. The client validates the length and rejects
// unexpected counts defensively.
message ChestUpdate {
  // The chest cell this update covers. Always set — closed updates carry
  // the location so the client knows which mirror to retire.
  ChestLocation chest = 1;
  // Full slot array of this chest's inventory. Empty for a close update.
  repeated ItemSlot slots = 2;
  // Task 590: `true` for the final update of a chest's lifetime (the
  // client should retire that chest's mirror). `false` (default) for
  // an open or contents-update.
  bool closed = 3;
}

// === Server -> client world state ===
//
// The server emits one `TickUpdate` per tick per client (see ADR 0003 — the
// chunk-centric networking model). Each client has a "view window" — the
// (2r+1)² square of chunks within `view_radius_chunks` of their own chunk —
// and the tick-update tells the client:
//
//   1. `full_state_chunks` — chunks that need to be (re)installed wholesale,
//      including their player set. These are chunks the client didn't
//      previously have in its known set, OR chunks it had that changed this
//      tick (any player moved within / into / out of the chunk).
//   2. `unmodified_chunks` — chunks the client still has and that didn't
//      change. The list is explicit so the client can distinguish "still in
//      view, no update needed" from "fell out of view" (implicit unload).
//
// Implicit-unload rule: anything in the client's last-known view window
// that does not appear in either field of this `TickUpdate` is dropped. A
// player that simply walks out of the receiver's view window disappears the
// same way — the chunk that contained them is no longer in the client's
// view, so the implicit-unload rule retires the player along with it.
//
// The first `TickUpdate` after `ServerWelcome` carries every chunk in the
// new player's view window as full-state (the client's known set is empty
// on connect and on reconnect).

message TickUpdate {
  repeated Chunk full_state_chunks = 1;
  repeated ChunkCoord unmodified_chunks = 2;
  // Per-tick block-edit feed (ADR-tracked side-channel for task 070).
  // Distinct from `full_state_chunks` because chunk delivery only tells the
  // client *what* the world looks like now, not *who* did the edit nor *when*
  // — both of which the targeting / pulse / shatter effects need to attribute
  // and animate. Scoped to the recipient's view window: an edit whose
  // `chunk_coord` is outside the receiver's window is suppressed (the
  // recipient wouldn't see the block anyway). Empty when no edits this tick.
  repeated BlockEdit edits = 3;
  // Players currently held-break-targeting a tile inside the recipient's view
  // window. Re-emitted every tick the set is non-empty so the client renders
  // a faint outlined frame + thin durability bar at the targeted cell, and
  // the absence of an entry is the canonical "stop showing the overlay"
  // signal (no separate release event). Includes the local player's own
  // targets so visuals stay consistent. Scope mirrors `edits` — entries whose
  // `chunk_coord` is outside the recipient's window are suppressed.
  repeated TargetingState targets = 4;
  // Server-authoritative time-of-day scalar (task 310). Monotonically growing
  // seconds since the world was created — persisted in the world save so a
  // restart picks up where it left off. The client computes the day phase as
  // `(time_of_day_seconds % DAY_LENGTH_SECONDS) / DAY_LENGTH_SECONDS` and
  // drives the directional sun + ambient tint from it; the server never
  // ships a phase, only the raw scalar, so client-side day length tweaks
  // stay possible without a wire change. Re-shipped every tick so a freshly
  // arrived client sees the world clock without waiting for a state change.
  double time_of_day_seconds = 5;
}

// One block edit emitted by the server this tick. `Placed` covers
// `try_place_top_block` outcomes (right-click, hotbar-driven kind); `Broken`
// covers `try_break_top_block` outcomes including the held-break completion
// path through `tick_durability`. The kind is the *resulting* top block for
// `Placed` (so the client can tint the pulse to match) and the *removed*
// top block for `Broken` (so a tree shatter can look different from a stone
// shatter if a future client wants).
message BlockEdit {
  enum Kind {
    BLOCK_EDIT_KIND_UNSPECIFIED = 0;
    BLOCK_EDIT_KIND_PLACED = 1;
    BLOCK_EDIT_KIND_BROKEN = 2;
  }
  uint64 player_id = 1;
  Kind kind = 2;
  ChunkCoord chunk_coord = 3;
  uint32 local_x = 4;
  uint32 local_y = 5;
  // The top-layer block kind involved in this edit — placed kind for
  // `Placed`, removed kind for `Broken`. Carries enough context that the
  // renderer can colorize / pick a particle template without re-reading the
  // chunk.
  BlockType block_type = 6;
}

// One held-break targeting state currently active in the recipient's view
// window. Emitted every tick a player is targeting a still-targetable cell
// (the durability sweep validates reach + targetable kind before a damage
// tick lands; the same predicate gates inclusion here). `durability_pct` is
// `current * 100 / max_durability` rounded down — `100` means "fresh" and
// `0` means "next tick lands the break". Encoded `u8`-wide via the proto3
// `uint32` minimum so the field stays compact when many players target many
// blocks.
message TargetingState {
  uint64 player_id = 1;
  ChunkCoord chunk_coord = 2;
  uint32 local_x = 3;
  uint32 local_y = 4;
  uint32 durability_pct = 5;
}

message ChunkCoord {
  int32 cx = 1;
  int32 cy = 2;
}

message PlayerSnapshot {
  uint64 id = 1;
  // Continuous world coordinates (+x = east, +y = north).
  double x = 2;
  double y = 3;
  // Largest `ClientAction.client_seq` from this player that the server has
  // integrated. Always present; zero before the player has sent any action.
  uint64 acked_client_seq = 4;
  // Direction the player is currently facing — sticky: the server snaps it
  // to the nearest of 8 each tick the stored movement intent is non-zero,
  // and leaves it alone when intent is zero so a stopped player keeps
  // looking where they were going.
  Direction8 facing = 5;
  // Lobby-chosen display name (already trimmed + validated server-side per
  // `game::lobby::validate_username`). Per-session only — not persisted, not
  // unique across players.
  string username = 6;
  // Index into the shared lobby palette (`game::lobby::PALETTE`). Validated
  // server-side; the renderer tints the player body by this entry.
  uint32 color_index = 7;
  // Item currently equipped in the player's Utility slot (task 360 / 370),
  // or `ITEM_ID_UNSPECIFIED` when nothing is. Visible to every observer (the
  // chunk-delivery snapshot, not the per-client `InventoryUpdate`) so the
  // lantern's player-attached point light renders for remote players too.
  // Today only `ITEM_ID_LANTERN` ships through this path; future utility
  // items can plug in without further wire change.
  ItemId equipped_utility = 8;
  // Chests this player currently has open (task 590 multi-open). Visible to
  // every observer so the renderer can draw a light beam from the player to
  // each open chest — including beams owned by remote players. Empty when
  // the player has no chest open. The set is bounded by
  // `Player::MAX_OPEN_CHESTS` on the server.
  repeated ChestLocation open_chests = 9;
}

// 8-way facing for the sphere-with-eyes player model. Cardinal first, then
// diagonals, in clockwise order starting from north. `UNSPECIFIED` is the
// proto3 default sentinel and is never emitted by the server (a freshly
// spawned player defaults to `S`); clients treat it as `S` defensively.
enum Direction8 {
  DIRECTION8_UNSPECIFIED = 0;
  DIRECTION8_N = 1;
  DIRECTION8_NE = 2;
  DIRECTION8_E = 3;
  DIRECTION8_SE = 4;
  DIRECTION8_S = 5;
  DIRECTION8_SW = 6;
  DIRECTION8_W = 7;
  DIRECTION8_NW = 8;
}

// === Terrain ===
//
// Mirrors the in-memory model fixed by ADR 0002 (anarchy-server/docs/
// decisions/0002-terrain-model.md): a chunk is two named layers
// (`ground` walkable surface, `top` standing geometry); each layer is a
// flat 16×16 array of `Block`s; a `Block` is a struct wrapping a typed
// kind so per-block metadata can grow as a field addition rather than a
// per-variant change. Wire integers for `BlockType` are chosen so AIR
// occupies the proto3 zero value — a default-initialized `Block` is an
// empty tile, which is exactly the right semantic. This deviates from
// the `Direction8` convention (`*_UNSPECIFIED = 0`) deliberately:
// `Direction8` has no natural identity element, but `BlockType` does,
// so a separate sentinel would just collapse into AIR anyway.
//
// Per ADR 0003 the chunk also carries the set of players whose centers
// currently fall inside it — chunk delivery is the unit of player
// delivery, not just terrain.

enum BlockType {
  BLOCK_TYPE_AIR = 0;
  BLOCK_TYPE_GRASS = 1;
  BLOCK_TYPE_WOOD = 2;
  BLOCK_TYPE_STONE = 3;
  BLOCK_TYPE_GOLD = 4;
  BLOCK_TYPE_TREE = 5;
  // Tree-felling drop. Top-layer-only, walk-through (no collision); placed
  // by `World::try_break_top_block` when a Tree is broken (see its docs for
  // the 3×3 random-drop rule). Not generated by worldgen, not placeable
  // through `PlaceBlock` today.
  BLOCK_TYPE_STICKS = 6;
  // Anti-cheat occlusion sentinel (task 060). A block is "hidden" when it
  // can't be seen by the player: a top-layer block whose four orthogonal
  // top-layer neighbors are all `is_full`, or a ground-layer block whose
  // overlying top cell is `is_full`. Hidden cells are emitted as this
  // wire-only variant so the client can render a neutral occluder without
  // ever learning the underlying kind. The server's internal `BlockType`
  // does NOT carry this variant — it's masked at serialization time. The
  // client also rejects targeting hidden cells, mirroring the server's
  // break/place rejection. Reads of unknown wire variants by older clients
  // fall through to AIR, which is a visually-confusing-but-safe default.
  BLOCK_TYPE_HIDDEN = 7;
  // Decorative top-layer flowers (task 130). Non-solid (players walk
  // through), single-tick break, drop their matching `ITEM_ID_FLOWER_*` so
  // the player can replant. Worldgen scatters them sparsely on Air-on-Grass
  // tiles via the `flower_pass`.
  BLOCK_TYPE_FLOWER_RED = 8;
  BLOCK_TYPE_FLOWER_YELLOW = 9;
  BLOCK_TYPE_FLOWER_BLUE = 10;
  BLOCK_TYPE_FLOWER_WHITE = 11;
  // Decorative top-layer bush (task 130). Non-solid, single-tick break.
  // Breaking drops 1-2 `ITEM_ID_STICK`s into the breaker's inventory — an
  // alternative stick source that does not scatter onto neighboring tiles
  // the way a Tree felling does.
  BLOCK_TYPE_BUSH = 12;
  // Ground-layer block-variety expansion (task 140). All five behave like
  // existing solid full blocks (placeable, walkable top, faster with a
  // pickaxe). `STONE_LIGHT` and `STONE_DARK` are render-only sibling variants
  // of `STONE` — same gameplay, different texture — so worldgen can paint
  // visual variety into stoney biomes without touching mining or drops.
  BLOCK_TYPE_DIRT = 13;
  BLOCK_TYPE_SAND = 14;
  BLOCK_TYPE_GRAVEL = 15;
  BLOCK_TYPE_STONE_LIGHT = 16;
  BLOCK_TYPE_STONE_DARK = 17;
  // Ore content (task 150). Solid full blocks scattered into the top layer
  // by the ore worldgen pass between `stone_pass` and `gold_pass`. Each ore
  // gates breaking on a minimum pickaxe tier (server `BlockMeta::min_tool_tier`)
  // and drops a raw item — `Coal` / `Diamond` are already gem-form and don't
  // smelt; the rest smelt to ingots via the crafting recipe table.
  BLOCK_TYPE_COPPER_ORE = 18;
  BLOCK_TYPE_IRON_ORE = 19;
  BLOCK_TYPE_TUNGSTEN_ORE = 20;
  BLOCK_TYPE_COAL_ORE = 21;
  BLOCK_TYPE_DIAMOND_ORE = 22;
  // Task 350 placed light source. Top-layer-only, non-solid (walk-through),
  // low durability, axe-broken or hand-broken. Renders as a torch sprite +
  // a per-block point light whose intensity scales with the night factor.
  BLOCK_TYPE_TORCH = 23;
  // Task 420 placeable storage. Top-layer-only, solid, axe-broken; right-
  // clicking a chest in range opens its inventory alongside the player's
  // grid. Broken chest drops the chest item plus the entirety of its
  // contents back into the breaker's inventory (anything that doesn't
  // fit is discarded). Worldgen never generates chests.
  BLOCK_TYPE_CHEST = 24;
  // Task 010-tombstone disconnect-loot grave. Top-layer-only, solid,
  // axe-broken. Spawned by the server at an unregistered (anonymous)
  // player's last position when they disconnect, carrying their full
  // inventory in the hosting chunk's chest map (reused — a tombstone is
  // "chest with a different sprite + spawn path"). Right-click opens the
  // same UI as a chest. No place item exists. Broken tombstone drops the
  // entirety of its contents back into the breaker's inventory; no block
  // item is dropped.
  BLOCK_TYPE_TOMBSTONE = 25;
  // Task 140 bioluminescent mushroom. Top-layer-only, non-solid (walk-
  // through), low durability, hand-broken. Renders as a small mushroom +
  // a soft cool point light weaker than a torch. Worldgen scatters in
  // DenseForest and inside mountain caves; players may also place them
  // via the standard right-click flow.
  BLOCK_TYPE_LIGHT_MUSHROOM = 26;
}

// One tile. Field set is intentionally minimal today — the wrapper
// message exists so per-block metadata (variant, hp, owner, lighting,
// …) can be added as field additions without rippling through every
// signature.
message Block {
  BlockType kind = 1;
}

// One horizontal slab of blocks. `blocks` is a flat array of length
// `LAYER_AREA = LAYER_SIZE * LAYER_SIZE = 16 * 16 = 256`, indexed by
// `idx(x, y) = y * LAYER_SIZE + x`. Receivers MUST verify the length
// before indexing — the wire encoding can't enforce it (proto3 has no
// fixed-size repeated).
message Layer {
  repeated Block blocks = 1;
}

// One 16×16 chunk at chunk-coord `(cx, cy)`. Chunk-coord `(cx, cy)` covers
// world tiles `cx*16 .. (cx+1)*16` along both axes — see ADR 0002 §5.
//
// Per ADR 0003 chunks carry the players whose center currently falls
// within them: the chunk is the unit of player delivery as well as
// terrain delivery. `players` is sorted by `PlayerSnapshot.id` so the
// wire form is deterministic for tests.
message Chunk {
  ChunkCoord coord = 1;
  Layer ground = 2;
  Layer top = 3;
  repeated PlayerSnapshot players = 4;
}

// === Inventory ===
//
// Per-player inventory mirror. Shipped to the originating client only — other
// connections never see another player's inventory. Sent immediately after
// `ServerWelcome` for the admitted client, then again each tick where the
// player's inventory mutated (drops, slot moves, place-consume — landing in
// later tasks).
//
// Carries the full slot array every time. Slot count is fixed to the
// server's `INVENTORY_SIZE` (9 hotbar + 36 main = 45); the client validates
// and rejects unexpected lengths defensively.

// Mirrors `crate::game::ItemId`. Numeric values are arbitrary but stable —
// extend by appending. `ITEM_ID_UNSPECIFIED = 0` is the proto3 default
// sentinel; the server never emits it.
enum ItemId {
  ITEM_ID_UNSPECIFIED = 0;
  ITEM_ID_STICK = 1;
  ITEM_ID_WOOD = 2;
  ITEM_ID_STONE = 3;
  ITEM_ID_GOLD = 4;
  // Task 090 tools — pickaxe + axe in five material tiers (Wood, Stone,
  // Copper, Iron, Tungsten). Inert in this iteration: holding one in the
  // hotbar does not enable mining-with-tools yet (task 120). Numbers stay
  // contiguous so the client's mirror map is a flat switch.
  ITEM_ID_WOOD_PICKAXE = 5;
  ITEM_ID_STONE_PICKAXE = 6;
  ITEM_ID_COPPER_PICKAXE = 7;
  ITEM_ID_IRON_PICKAXE = 8;
  ITEM_ID_TUNGSTEN_PICKAXE = 9;
  ITEM_ID_WOOD_AXE = 10;
  ITEM_ID_STONE_AXE = 11;
  ITEM_ID_COPPER_AXE = 12;
  ITEM_ID_IRON_AXE = 13;
  ITEM_ID_TUNGSTEN_AXE = 14;
  // Task 130 decorative content drops. Each flower kind has its own item
  // form so a player can replant the variant they picked up. The bush has
  // its own item form for symmetry with the place-from-inventory affordance,
  // but bushes drop sticks rather than themselves so a bush item is not
  // normally obtainable through gameplay.
  ITEM_ID_FLOWER_RED = 15;
  ITEM_ID_FLOWER_YELLOW = 16;
  ITEM_ID_FLOWER_BLUE = 17;
  ITEM_ID_FLOWER_WHITE = 18;
  ITEM_ID_BUSH = 19;
  // Task 140 ground-block-variety drops. Each kind drops a matching item;
  // the item places its block.
  ITEM_ID_DIRT = 20;
  ITEM_ID_SAND = 21;
  ITEM_ID_GRAVEL = 22;
  ITEM_ID_STONE_LIGHT = 23;
  ITEM_ID_STONE_DARK = 24;
  // Task 150 raw ore drops. `RawCopper` / `RawIron` / `RawTungsten` smelt to
  // their matching ingot via the crafting recipe table; `Coal` and `Diamond`
  // are gem-form and used directly (Diamond as a tool ingredient, Coal as a
  // future fuel reserve — currently just stackable inventory loot).
  ITEM_ID_RAW_COPPER = 25;
  ITEM_ID_RAW_IRON = 26;
  ITEM_ID_RAW_TUNGSTEN = 27;
  ITEM_ID_COAL = 28;
  ITEM_ID_DIAMOND = 29;
  // Refined ingots crafted from the matching raw via the smelting recipes
  // (`copper-ingot`, `iron-ingot`, `tungsten-ingot`). Tool recipes for the
  // copper / iron / tungsten tiers consume these.
  ITEM_ID_COPPER_INGOT = 30;
  ITEM_ID_IRON_INGOT = 31;
  ITEM_ID_TUNGSTEN_INGOT = 32;
  // Task 350 placed-light source. Crafted from 1 Stick + 1 Coal → 4 Torches
  // and placed via the standard right-click flow.
  ITEM_ID_TORCH = 33;
  // Task 370 first Utility item. Crafted from 1 Torch + 1 IronIngot → 1
  // Lantern. Equipped into the Utility slot — a worn item, not a placed
  // block. Carried on `PlayerSnapshot.equipped_utility` so every observer
  // (not just the originating client) can render the player-attached light.
  ITEM_ID_LANTERN = 34;
  // Task 390 felled-tree drop. Trees no longer scatter `BLOCK_TYPE_STICKS`
  // in a 3×3 around the broken tile — they drop 1-3 `Log` items
  // (axe-tier dependent) into the breaker's inventory. Logs are not
  // placeable; they craft into Wood blocks (1 Log → 1 Wood) or sticks
  // (1 Log → 4 Sticks).
  ITEM_ID_LOG = 35;
  // Task 420 placeable storage. Crafted from 8 Wood; places `BLOCK_TYPE_CHEST`
  // via the standard right-click flow. Stacks like a normal block item.
  ITEM_ID_CHEST = 36;
  // Task 530 third tool family — shovels in five material tiers. Mining
  // `Sand`, `Dirt`, `Gravel`, `Grass` with the matching shovel is fast and
  // drops normally; mining them with the wrong tool falls back to the
  // soft tool gate (task 520) — slow and dropless. Recipes mirror the
  // axe ladder exactly.
  ITEM_ID_WOOD_SHOVEL = 37;
  ITEM_ID_STONE_SHOVEL = 38;
  ITEM_ID_COPPER_SHOVEL = 39;
  ITEM_ID_IRON_SHOVEL = 40;
  ITEM_ID_TUNGSTEN_SHOVEL = 41;
  // Task 580 — Grass blocks are now collectible. Breaking a Grass cell
  // drops an `ITEM_ID_GRASS` (stackable like other block items); the item
  // places `BLOCK_TYPE_GRASS` via the standard right-click flow.
  ITEM_ID_GRASS = 42;
  // Task 140 bioluminescent mushroom drop. Placeable; right-click places
  // a `BLOCK_TYPE_LIGHT_MUSHROOM` into a top-layer Air cell. Stacks like a
  // normal block item.
  ITEM_ID_LIGHT_MUSHROOM = 43;
}

// One inventory cell. `count == 0` is the canonical empty slot — the server
// emits `count == 0` (and `item == ITEM_ID_UNSPECIFIED`) for empty slots so
// the wire shape mirrors the in-memory `Slot = Option<ItemStack>` exactly.
// Receivers MUST treat `count == 0` as empty regardless of `item`.
message ItemSlot {
  ItemId item = 1;
  uint32 count = 2;
}

message InventoryUpdate {
  // Full slot array — length is the server's `INVENTORY_SIZE` (45). Indices
  // `0..9` are the hotbar; `9..45` are the main grid. Receivers reject any
  // other length defensively.
  repeated ItemSlot slots = 1;
  // Field numbers 2/3 originally carried the equipped tool's full
  // `ItemSlot` (task 100). Task 010 reworked equipment into a flag — the
  // tool itself stays in its inventory cell — and the wire surface
  // collapsed to a single slot index per kind. Old field numbers are
  // reserved so no future schema edit reuses them with a different shape.
  reserved 2, 3;
  reserved "equipped_pickaxe", "equipped_axe";
  // Inventory slot index (`0..INVENTORY_SIZE`) of the equipped pickaxe;
  // `-1` (or any value `< 0` / `>= INVENTORY_SIZE`) means "no tool
  // equipped". The matching cell in `slots` is the equipped tool;
  // receivers paint the cell with the equipped-pickaxe highlight color
  // and mirror the cell into the mini-hotbar pickaxe slot panel. The
  // server keeps this aligned to a cell whose item is a pickaxe; clients
  // that observe a misaligned index treat it as "no tool equipped"
  // defensively.
  int32 equipped_pickaxe_slot = 4;
  // Inventory slot index of the equipped axe — see
  // `equipped_pickaxe_slot`.
  int32 equipped_axe_slot = 5;
  // Inventory slot index of the equipped utility item (task 360) — see
  // `equipped_pickaxe_slot`. Empty by default; populated when a utility
  // item is equipped. The selected-cell highlight on the matching cell
  // paints blue (vs. orange/green for pickaxe/axe) so the three slots
  // stay visually distinct.
  int32 equipped_utility_slot = 7;
  // Inventory slot index of the equipped shovel (task 530) — see
  // `equipped_pickaxe_slot`. Empty by default; populated when a shovel
  // tier is equipped. The matching cell paints yellow.
  int32 equipped_shovel_slot = 8;
  // Field 6 originally carried `repeated string craftable_recipe_ids`
  // (task 090). Task 100 reshaped it into a richer
  // `repeated RecipeEntry` so each row carries its availability tier
  // (affordable vs. partial-hint). Old field number is reserved so no
  // future schema edit reuses it with a different shape.
  reserved 6;
  reserved "craftable_recipe_ids";
  // Recipes (task 100) the server is advertising for this player. Each
  // entry carries a stable string id — `"sticks"`, `"wood-pickaxe"`,
  // etc. — that the client looks up against its own recipe table for the
  // display name + ingredient/output preview, plus an availability tier
  // distinguishing fully-affordable rows from partial-hint rows (player
  // has at least one of any ingredient but not enough to actually craft).
  // The server omits recipes the player has zero relevant ingredients
  // for, keeping the wire small. Re-emitted on every `InventoryUpdate`
  // so the crafting panel stays current as the player picks up / drops
  // items. The server still re-validates at `CraftRequest` time and may
  // reject (e.g. inventory full to receive the output) — affordability
  // is purely an affordance filter.
  repeated RecipeEntry craftable_recipes = 9;
}

// One recipe row shipped to the client (task 100). `availability` shapes
// how the client renders the row — affordable rows render normally and
// click to craft, partial-hint rows render grayed and are click-inert.
message RecipeEntry {
  string recipe_id = 1;
  RecipeAvailability availability = 2;
}

// Whether a `RecipeEntry` is fully craftable from the player's pooled
// inventory or only partially hinted. `AFFORDABLE = 0` so a default-
// constructed entry reads as the natural "you can craft this" tier;
// `PARTIAL_HINT` is the explicit "you have some but not enough" tier.
// Mirrors the `BlockType` precedent (proto3 zero is the natural
// identity, no separate `*_UNSPECIFIED` sentinel).
enum RecipeAvailability {
  RECIPE_AVAILABILITY_AFFORDABLE = 0;
  RECIPE_AVAILABILITY_PARTIAL_HINT = 1;
}
