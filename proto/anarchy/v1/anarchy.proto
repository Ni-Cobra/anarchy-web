syntax = "proto3";

package anarchy.v1;

// All client/server traffic is exactly one ClientMessage or ServerMessage
// per WebSocket frame, encoded as binary protobuf. One decode path per
// side; payloads dispatched via the inner oneof.
//
// Payload field-number convention inside the envelope oneofs:
//   10-19 : connection lifecycle (handshake, heartbeat)
//   20-29 : per-tick world state (chunk-centric — see ADR 0003)
// New payloads slot into the matching range so wire numbers stay grouped.

// === Envelopes ===

message ClientMessage {
  uint64 seq = 1;
  oneof payload {
    ClientHello hello = 10;
    Ping ping = 11;
    ClientAction action = 20;
    BreakBlock break_block = 21;
    PlaceBlock place_block = 22;
  }
}

message ServerMessage {
  uint64 seq = 1;
  uint64 ack_seq = 2;
  oneof payload {
    ServerWelcome welcome = 10;
    Pong pong = 11;
    TickUpdate tick_update = 20;
  }
}

// === Handshake ===

// First frame on every connection. Carries the lobby choices the client
// collected before opening the WebSocket: a per-session display `username`
// and an index into the shared color palette (`game::lobby::PALETTE` on the
// server, the same table mirrored client-side). The server validates length,
// charset, and palette range — see `game::lobby::validate_username` /
// `validate_color_index` — and only admits the player to the world once a
// well-formed Hello has landed. Repeat Hello frames are ignored.
message ClientHello {
  string client_version = 1;
  string username = 2;
  uint32 color_index = 3;
}

message ServerWelcome {
  string server_version = 1;
  uint32 tick_rate_hz = 2;
  // The id the server has assigned to this connection's player.
  uint64 player_id = 3;
  // Chebyshev radius (in chunks) of the per-client view window. The window is
  // a (2r+1)² square of chunks centered on the player's chunk; chunks within
  // the window are eligible for full-state delivery and chunks outside are
  // dropped from the client's known set. ADR 0003 §3.
  int32 view_radius_chunks = 4;
}

// === Heartbeat ===

message Ping {
  uint64 client_time_ms = 1;
}

message Pong {
  uint64 client_time_ms = 1;
  uint64 server_time_ms = 2;
}

// === Client -> server intent ===

// Server-authoritative client intent for one tick. The server alone derives
// the resulting position; the client never sends coordinates.
//
// Today the only intent is movement; future kinds (attack, pickup, …) will
// land here as siblings. The client emits these as state-replacing updates
// — the server stores the latest per-player intent and advances positions
// each tick from it. Diagonals are normalized client-side; the server
// clamps `|move_intent| ≤ 1` defensively.
//
// `client_seq` is a per-client monotonic action counter. The server stores
// the largest seq it has applied for each player and echoes it back in the
// player's `PlayerSnapshot.acked_client_seq` field, so the client knows
// which of its inputs the server has integrated.
message ClientAction {
  MoveIntent move_intent = 1;
  uint64 client_seq = 2;
}

// Continuous 2D movement intent in world axes (+x = east, +y = north).
// Magnitude is in `{0, 1}` for a canonical client (zero = stopped, one =
// full speed in the (dx, dy) direction). The server clamps to ≤ 1.
message MoveIntent {
  double dx = 1;
  double dy = 2;
}

// Client→server intent to destroy the top-layer block at the given cell.
// The server validates the player exists, the targeted cell holds a non-Air
// top-layer block, and the player's authoritative position is within reach
// (see `crate::config::REACH_BLOCKS` — Euclidean distance from player center
// to block center). On success the cell is cleared and the chunk marked
// dirty so the next `TickUpdate` ships the change. Validation failures are
// silently dropped: a misbehaving client cannot tell whether it lost a race
// or sent a malformed message.
message BreakBlock {
  ChunkCoord chunk_coord = 1;
  // Local cell within the chunk, in `[0, LAYER_SIZE)`. Out-of-range values
  // are validated server-side and silently dropped.
  uint32 local_x = 2;
  uint32 local_y = 3;
}

// Client→server intent to place a top-layer block at the given cell.
// Today the only placeable kind is `BLOCK_TYPE_GOLD` (the builder-mode
// affordance); the field is on the wire so future placeable kinds slot in
// without a schema change. The server validates: chunk loaded, target cell's
// top is currently Air, no player AABB overlaps the cell, and the player's
// authoritative position is within `crate::config::REACH_BLOCKS` of the cell
// center. Failures are silently dropped — same posture as `BreakBlock`.
message PlaceBlock {
  ChunkCoord chunk_coord = 1;
  uint32 local_x = 2;
  uint32 local_y = 3;
  BlockType kind = 4;
}

// === Server -> client world state ===
//
// The server emits one `TickUpdate` per tick per client (see ADR 0003 — the
// chunk-centric networking model). Each client has a "view window" — the
// (2r+1)² square of chunks within `view_radius_chunks` of their own chunk —
// and the tick-update tells the client:
//
//   1. `full_state_chunks` — chunks that need to be (re)installed wholesale,
//      including their player set. These are chunks the client didn't
//      previously have in its known set, OR chunks it had that changed this
//      tick (any player moved within / into / out of the chunk).
//   2. `unmodified_chunks` — chunks the client still has and that didn't
//      change. The list is explicit so the client can distinguish "still in
//      view, no update needed" from "fell out of view" (implicit unload).
//
// Implicit-unload rule: anything in the client's last-known view window
// that does not appear in either field of this `TickUpdate` is dropped. A
// player that simply walks out of the receiver's view window disappears the
// same way — the chunk that contained them is no longer in the client's
// view, so the implicit-unload rule retires the player along with it.
//
// The first `TickUpdate` after `ServerWelcome` carries every chunk in the
// new player's view window as full-state (the client's known set is empty
// on connect and on reconnect).

message TickUpdate {
  repeated Chunk full_state_chunks = 1;
  repeated ChunkCoord unmodified_chunks = 2;
}

message ChunkCoord {
  int32 cx = 1;
  int32 cy = 2;
}

message PlayerSnapshot {
  uint64 id = 1;
  // Continuous world coordinates (+x = east, +y = north).
  double x = 2;
  double y = 3;
  // Largest `ClientAction.client_seq` from this player that the server has
  // integrated. Always present; zero before the player has sent any action.
  uint64 acked_client_seq = 4;
  // Direction the player is currently facing — sticky: the server snaps it
  // to the nearest of 8 each tick the stored movement intent is non-zero,
  // and leaves it alone when intent is zero so a stopped player keeps
  // looking where they were going.
  Direction8 facing = 5;
  // Lobby-chosen display name (already trimmed + validated server-side per
  // `game::lobby::validate_username`). Per-session only — not persisted, not
  // unique across players.
  string username = 6;
  // Index into the shared lobby palette (`game::lobby::PALETTE`). Validated
  // server-side; the renderer tints the player body by this entry.
  uint32 color_index = 7;
}

// 8-way facing for the sphere-with-eyes player model. Cardinal first, then
// diagonals, in clockwise order starting from north. `UNSPECIFIED` is the
// proto3 default sentinel and is never emitted by the server (a freshly
// spawned player defaults to `S`); clients treat it as `S` defensively.
enum Direction8 {
  DIRECTION8_UNSPECIFIED = 0;
  DIRECTION8_N = 1;
  DIRECTION8_NE = 2;
  DIRECTION8_E = 3;
  DIRECTION8_SE = 4;
  DIRECTION8_S = 5;
  DIRECTION8_SW = 6;
  DIRECTION8_W = 7;
  DIRECTION8_NW = 8;
}

// === Terrain ===
//
// Mirrors the in-memory model fixed by ADR 0002 (anarchy-server/docs/
// decisions/0002-terrain-model.md): a chunk is two named layers
// (`ground` walkable surface, `top` standing geometry); each layer is a
// flat 16×16 array of `Block`s; a `Block` is a struct wrapping a typed
// kind so per-block metadata can grow as a field addition rather than a
// per-variant change. Wire integers for `BlockType` are chosen so AIR
// occupies the proto3 zero value — a default-initialized `Block` is an
// empty tile, which is exactly the right semantic. This deviates from
// the `Direction8` convention (`*_UNSPECIFIED = 0`) deliberately:
// `Direction8` has no natural identity element, but `BlockType` does,
// so a separate sentinel would just collapse into AIR anyway.
//
// Per ADR 0003 the chunk also carries the set of players whose centers
// currently fall inside it — chunk delivery is the unit of player
// delivery, not just terrain.

enum BlockType {
  BLOCK_TYPE_AIR = 0;
  BLOCK_TYPE_GRASS = 1;
  BLOCK_TYPE_WOOD = 2;
  BLOCK_TYPE_STONE = 3;
  BLOCK_TYPE_GOLD = 4;
}

// One tile. Field set is intentionally minimal today — the wrapper
// message exists so per-block metadata (variant, hp, owner, lighting,
// …) can be added as field additions without rippling through every
// signature.
message Block {
  BlockType kind = 1;
}

// One horizontal slab of blocks. `blocks` is a flat array of length
// `LAYER_AREA = LAYER_SIZE * LAYER_SIZE = 16 * 16 = 256`, indexed by
// `idx(x, y) = y * LAYER_SIZE + x`. Receivers MUST verify the length
// before indexing — the wire encoding can't enforce it (proto3 has no
// fixed-size repeated).
message Layer {
  repeated Block blocks = 1;
}

// One 16×16 chunk at chunk-coord `(cx, cy)`. Chunk-coord `(cx, cy)` covers
// world tiles `cx*16 .. (cx+1)*16` along both axes — see ADR 0002 §5.
//
// Per ADR 0003 chunks carry the players whose center currently falls
// within them: the chunk is the unit of player delivery as well as
// terrain delivery. `players` is sorted by `PlayerSnapshot.id` so the
// wire form is deterministic for tests.
message Chunk {
  ChunkCoord coord = 1;
  Layer ground = 2;
  Layer top = 3;
  repeated PlayerSnapshot players = 4;
}
